<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Projects — Muhammad Ammar</title>
    <meta name="description" content="Browse all of Muhammad Ammar's AI and ML projects." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>
    <div class="parallax-blobs" aria-hidden="true">
      <span class="blob blob--1"></span>
      <span class="blob blob--2"></span>
    </div>

    <header class="site-header">
      <div class="nav__backdrop"></div>
      <nav class="nav" aria-label="Primary">
        <a class="brand" href="index.html#home" aria-label="Muhammad Ammar — home">
          <span class="brand__name">Muhammad Ammar</span><span class="brand__dot">.</span>
        </a>

        <button class="nav__toggle" type="button" aria-label="Open menu" aria-expanded="false">
          <span class="nav__toggle-lines" aria-hidden="true"></span>
        </button>

        <div class="nav__right" data-nav-panel>
          <ul class="nav__links" role="list">
            <li><a class="nav__link" href="index.html#home">Home</a></li>
            <li><a class="nav__link" href="index.html#services">Services</a></li>
            <li><a class="nav__link" href="index.html#info">Info</a></li>
            <li><a class="nav__link" href="index.html#projects">Projects</a></li>
            <li><a class="nav__link" href="index.html#contact">Contact</a></li>
          </ul>
          <button class="theme-toggle" type="button" aria-label="Toggle theme" aria-pressed="false">
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
                <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M20.5 14.5A7.5 7.5 0 0 1 11 5a7.5 7.5 0 1 0 9.5 9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>
          <a class="btn btn--primary btn--pill" href="index.html#contact">Hire me</a>
        </div>
      </nav>
    </header>

    <main class="projects-page">
      <div class="container">
        <div class="projects-head" data-reveal>
          <p class="section-head__eyebrow">Projects</p>
          <h1 class="section-head__title">All projects</h1>
          <p class="section-head__lead">Browse all projects and filter by category or sort by date.</p>
        </div>

        <div class="projects-controls" style="justify-content:space-between;align-items:center" data-reveal>
          <a class="btn btn--outline btn--pill" href="index.html#projects" data-back-projects>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Back to Projects
          </a>
        </div>

        <div class="projects-controls" role="group" aria-label="Project filters">
          <label class="field" style="max-width:220px">
            <span class="sr-only">Filter by category</span>
            <select class="input select" id="category-filter">
              <option value="all">All categories</option>
              <option value="computer-vision">Computer Vision</option>
              <option value="nlp">NLP</option>
              <option value="machine-learning">Machine Learning</option>
              <option value="deep-learning">Deep Learning</option>
            </select>
            <svg class="select__chev" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </label>

          <label class="field" style="max-width:220px">
            <span class="sr-only">Sort projects</span>
            <select class="input select" id="sort-filter">
              <option value="date-desc">Newest first</option>
              <option value="date-asc">Oldest first</option>
              <option value="name-asc">Name A–Z</option>
              <option value="name-desc">Name Z–A</option>
            </select>
            <svg class="select__chev" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </label>
        </div>

        <div class="projects-grid" id="projects-grid"></div>
      </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" id="modal-dialog">
        <button class="modal__close" type="button" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="modal__body" id="modal-body"></div>
      </div>
    </div>

    <script src="js/projects-data.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/all-projects.js" defer></script>
    <script src="js/animations.js" defer></script>
  </body>
</html>
